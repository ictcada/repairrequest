<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICTC Equipment Repair Service Request Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>ICTC Equipment Repair Service Request</h1>
        <p><a href="index.html">Back to Dashboard</a></p>
        <form id="repairForm">
            <div class="form-group">
                <label for="requesterName">Requester Name:</label>
                <input type="text" id="requesterName" name="requesterName" required>
            </div>
            <div class="form-group">
                <label for="department">Department:</label>
                <input type="text" id="department" name="department" required>
            </div>
            <div class="form-group">
                <label for="contactInfo">Contact Information (Email/Phone):</label>
                <input type="text" id="contactInfo" name="contactInfo" required>
            </div>
            <div class="form-group">
                <label for="equipmentType">Equipment Type:</label>
                <select id="equipmentType" name="equipmentType" required>
                    <option value="">Select Equipment Type</option>
                    <option value="computer">Computer</option>
                    <option value="laptop">Laptop</option>
                    <option value="printer">Printer</option>
                    <option value="network_device">Network Device</option>
                    <option value="monitor">Monitor</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="equipmentId">Equipment ID/Serial Number:</label>
                <input type="text" id="equipmentId" name="equipmentId">
            </div>
            <div class="form-group">
                <label for="location">Location:</label>
                <input type="text" id="location" name="location" required>
            </div>
            <div class="form-group">
                <label for="problemDescription">Description of Problem:</label>
                <textarea id="problemDescription" name="problemDescription" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="urgency">Urgency Level:</label>
                <select id="urgency" name="urgency" required>
                    <option value="">Select Urgency</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            <div class="form-group">
                <label for="requestDate">Request Date:</label>
                <input type="date" id="requestDate" name="requestDate" required>
            </div>
            <button type="submit">Submit Request</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
